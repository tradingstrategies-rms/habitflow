<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #faf9f8;
            overflow: hidden;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .organic-shape {
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            animation: morph 20s ease-in-out infinite both alternate;
        }

        @keyframes morph {
            0% { border-radius: 40% 60% 70% 30% / 40% 40% 60% 50%; }
            34% { border-radius: 70% 30% 50% 50% / 30% 30% 70% 70%; }
            67% { border-radius: 100% 60% 60% 100% / 100% 100% 60% 60%; }
            100% { border-radius: 40% 60% 70% 30% / 40% 40% 60% 50%; }
        }

        .float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .fade-in {
            animation: fadeIn 1.2s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stagger-1 { animation-delay: 0.2s; }
        .stagger-2 { animation-delay: 0.4s; }
        .stagger-3 { animation-delay: 0.6s; }
    </style>
</head>
<body class="bg-background min-h-screen flex flex-col justify-between relative overflow-hidden">

<script>
        // Micro-interaction for the "Get Started" button
        const btn = document.querySelector('button.bg-primary-container');
        btn.addEventListener('mouseenter', () => {
            const leaf = document.querySelector('.float');
            leaf.style.animationPlayState = 'paused';
        });
        btn.addEventListener('mouseleave', () => {
            const leaf = document.querySelector('.float');
            leaf.style.animationPlayState = 'running';
        });

        // Simple smooth scroll reveal for late-loaders
        document.addEventListener('DOMContentLoaded', () => {
            const fades = document.querySelectorAll('.fade-in');
            fades.forEach((el, index) => {
                setTimeout(() => {
                    el.classList.add('opacity-100');
                }, index * 200);
            });
        });
    </script>
