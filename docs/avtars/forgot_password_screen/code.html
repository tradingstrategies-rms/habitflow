<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Background Decorative Element (Organic Vitality Aesthetic) -->
<div class="absolute top-[-10%] right-[-5%] w-[400px] h-[400px] bg-primary-container/10 rounded-full blur-[80px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[350px] h-[350px] bg-secondary-container/10 rounded-full blur-[80px] pointer-events-none"></div>
<!-- Top Navigation (Shell Implementation - Non-navigational Back Button only) -->
<header class="fixed top-0 left-0 w-full flex items-center justify-between px-margin-mobile h-touch-target-min bg-transparent z-50">
<button aria-label="Go back" class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-variant/20 transition-transform duration-200 active:scale-95 text-primary">
<span class="material-symbols-outlined">arrow_back</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-[440px] px-margin-mobile flex flex-col items-center gap-8 relative z-10">
<!-- Branding/Icon Section -->
<div class="flex flex-col items-center gap-4 mb-2">
<div class="w-16 h-16 bg-primary-container rounded-2xl flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-on-primary-container text-[32px]">lock_reset</span>
</div>
</div>
<!-- Headline & Instructions -->
<div class="text-center space-y-3">
<h1 class="font-headline-xl-mobile text-headline-xl-mobile text-on-background tracking-tight">
                Forgot Password?
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[320px] mx-auto">
                No worries, it happens. Enter your email and we'll send you a link to reset your password.
            </p>
</div>
<!-- Form Card -->
<div class="w-full glass-card p-card-padding rounded-[20px] shadow-[0_4px_24px_rgba(0,0,0,0.04)] border border-surface-variant/30 flex flex-col gap-6">
<!-- Email Input Field -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="email">
                    Email Address
                </label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">
                        mail
                    </span>
<input class="w-full h-touch-target-min pl-12 pr-4 bg-surface rounded-xl border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all font-body-lg text-on-background outline-none placeholder:text-outline/50" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Primary Action Button -->
<button class="w-full h-[56px] bg-primary hover:bg-primary/90 text-on-primary rounded-xl font-headline-sm text-headline-sm flex items-center justify-center gap-2 shadow-lg shadow-primary/10 transition-all active:scale-[0.98] focus:ring-4 focus:ring-primary/20">
<span>Reset Password</span>
<span class="material-symbols-outlined text-[20px]">send</span>
</button>
</div>
<!-- Footer Link -->
<a class="group flex items-center gap-2 py-2 px-4 rounded-full hover:bg-primary/5 transition-colors" href="#">
<span class="material-symbols-outlined text-primary text-[18px] group-hover:-translate-x-1 transition-transform">arrow_back</span>
<span class="font-label-sm text-label-sm text-primary font-semibold">Back to login</span>
</a>
</main>
<!-- Support Help Section (Subtle) -->
<footer class="fixed bottom-8 flex flex-col items-center gap-2">
<p class="font-caption text-caption text-outline">
            Having trouble? <a class="text-primary font-medium hover:underline" href="#">Contact Support</a>
</p>
</footer>
<!-- Micro-interaction Script -->
<script>
        // Simple input focus enhancement
        const emailInput = document.getElementById('email');
        const submitBtn = document.querySelector('button.bg-primary');

        emailInput.addEventListener('input', (e) => {
            if (e.target.value.includes('@') && e.target.value.length > 5) {
                submitBtn.classList.remove('opacity-50');
                submitBtn.classList.add('cursor-pointer');
            } else {
                // Not using full disable for UX, just a visual hint
            }
        });

        // Atmospheric parallax on mouse move (desktop only)
        if (window.innerWidth > 768) {
            document.addEventListener('mousemove', (e) => {
                const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
                const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
                
                document.querySelectorAll('.rounded-full[class*="bg-"]').forEach(bg => {
                    bg.style.transform = `translate(${moveX}px, ${moveY}px)`;
                });
            });
        }
    </script>
