<body class="bg-background text-on-surface min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 bg-surface flex justify-between items-center px-margin-mobile md:px-margin-desktop h-14 md:h-16">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-touch-target-min h-touch-target-min hover:bg-surface-container-low transition-colors rounded-full active:scale-95 duration-150">
<span class="material-symbols-outlined text-on-surface-variant">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm-mobile md:text-headline-sm text-on-surface">Edit Profile</h1>
</div>
<button class="font-label-sm text-label-sm text-primary px-4 py-2 hover:bg-surface-container-low rounded-full transition-colors active:scale-95 duration-150">
            Cancel
        </button>
</header>
<main class="w-full max-w-2xl px-margin-mobile md:px-margin-desktop py-8 flex-1">
<!-- Profile Header Section -->
<section class="flex flex-col items-center mb-10">
<div class="relative group">
<div class="w-32 h-32 md:w-40 md:h-40 rounded-full border-4 border-surface shadow-sm overflow-hidden bg-surface-container-high">
<img class="w-full h-full object-cover" data-alt="A premium close-up portrait of a friendly, professional young parent in a soft-lit, modern home office setting. The style is minimalist with organic green accents, featuring high-key lighting and a clean, shallow depth of field. The mood is warm, reliable, and approachable, aligned with a high-end wellness and habit-tracking application aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA-KTyzJnzo830ad8a9fTJ09N0B2CwH5TbCxidMk41corwEc6BVBke5ELVqchYH8BgUh75Zbbp4fNV2bKCa-q9ekCC85tbE2GVtliLgOXePoDevW79y7MS8SIgOmldGgjvGhPMoBqbRL9ja2MwqmJHezdLT_XWvlXFgbmc0iCCz3hofJboZ1GPgSKIbwVphSmPyoFzzPgyAfMpoCXcu8tXH-YukibZB0LPVbq_5Jrw5E8ipawyDk17v"/>
</div>
<button class="absolute bottom-1 right-1 bg-primary text-on-primary p-2 rounded-full shadow-lg hover:bg-on-primary-fixed-variant transition-transform active:scale-90 duration-150">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
</button>
</div>
<button class="mt-4 font-label-sm text-label-sm text-primary hover:text-on-primary-fixed-variant transition-colors">
                Change Avatar
            </button>
</section>
<!-- Form Fields -->
<form class="space-y-6">
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- First Name -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="first-name">First Name</label>
<div class="relative flex items-center group">
<input class="w-full bg-surface border-1.5 border-outline-variant rounded-xl px-4 py-3.5 font-body-lg text-body-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all group-hover:border-outline" id="first-name" type="text" value="Alex"/>
</div>
</div>
<!-- Last Name -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="last-name">Last Name</label>
<div class="relative flex items-center group">
<input class="w-full bg-surface border-1.5 border-outline-variant rounded-xl px-4 py-3.5 font-body-lg text-body-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all group-hover:border-outline" id="last-name" type="text" value="Henderson"/>
</div>
</div>
</div>
<!-- Display Name -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="display-name">Display Name</label>
<div class="relative flex items-center group">
<input class="w-full bg-surface border-1.5 border-outline-variant rounded-xl px-4 py-3.5 font-body-lg text-body-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all group-hover:border-outline" id="display-name" type="text" value="AlexH_Habits"/>
<span class="absolute right-4 text-outline material-symbols-outlined text-[20px]">alternate_email</span>
</div>
<p class="font-caption text-caption text-outline ml-1">This is how other family members will see you.</p>
</div>
<!-- Bio -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="bio">Bio</label>
<div class="relative flex items-center group">
<textarea class="w-full bg-surface border-1.5 border-outline-variant rounded-xl px-4 py-3.5 font-body-lg text-body-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all group-hover:border-outline resize-none" id="bio" rows="3">Consistency is key! Building better habits for a healthier family life every single day. 🌿</textarea>
</div>
</div>
<!-- Email (Read Only / Locked Style) -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative flex items-center bg-surface-container-low border-1.5 border-outline-variant/30 rounded-xl px-4 py-3.5">
<input class="w-full bg-transparent font-body-lg text-body-lg text-on-surface-variant outline-none border-none p-0 cursor-not-allowed" id="email" readonly="" type="email" value="alex.henderson@example.com"/>
<span class="material-symbols-outlined text-outline text-[20px]">lock</span>
</div>
</div>
<!-- Preferences / Settings toggle -->
<div class="pt-4 border-t border-outline-variant/30 mt-8">
<h2 class="font-headline-sm text-headline-sm-mobile text-on-surface mb-4">Account Security</h2>
<button class="w-full flex items-center justify-between p-4 hover:bg-surface-container-low rounded-xl transition-colors active:bg-surface-container-high" type="button">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary">key</span>
<div class="text-left">
<p class="font-body-lg text-body-lg text-on-surface">Change Password</p>
<p class="font-caption text-caption text-on-surface-variant">Last updated 3 months ago</p>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</button>
</div>
</form>
</main>
<!-- Bottom Action Area -->
<footer class="w-full max-w-2xl px-margin-mobile md:px-margin-desktop py-6 mb-safe">
<button class="w-full bg-primary text-on-primary font-headline-sm py-4 rounded-xl shadow-lg hover:bg-on-primary-fixed-variant transition-all active:scale-[0.98] duration-150 flex items-center justify-center gap-2">
            Save Changes
        </button>
<p class="mt-4 text-center font-caption text-caption text-on-surface-variant">
            By saving, you agree to our <a class="text-primary font-medium underline underline-offset-2" href="#">Terms of Service</a>.
        </p>
</footer>
<!-- Micro-interaction Script -->
<script>
        document.querySelectorAll('input, textarea').forEach(el => {
            el.addEventListener('focus', () => {
                el.parentElement.classList.add('scale-[1.01]');
            });
            el.addEventListener('blur', () => {
                el.parentElement.classList.remove('scale-[1.01]');
            });
        });

        // Simple feedback for the save button
        const saveBtn = document.querySelector('button.bg-primary');
        saveBtn.addEventListener('click', (e) => {
            e.preventDefault();
            const originalContent = saveBtn.innerHTML;
            saveBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Updating...';
            saveBtn.disabled = true;
            saveBtn.classList.add('opacity-80');
            
            setTimeout(() => {
                saveBtn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Profile Saved';
                saveBtn.classList.remove('bg-primary');
                saveBtn.classList.add('bg-success');
                
                setTimeout(() => {
                    saveBtn.innerHTML = originalContent;
                    saveBtn.classList.remove('bg-success', 'opacity-80');
                    saveBtn.classList.add('bg-primary');
                    saveBtn.disabled = false;
                }, 2000);
            }, 1200);
        });
    </script>
</body></html>
