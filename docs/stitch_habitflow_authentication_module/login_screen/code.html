        body {
            font-family: 'Inter', sans-serif;
            background-color: #faf9f8;
            -webkit-tap-highlight-color: transparent;

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-margin-mobile md:p-margin-desktop overflow-x-hidden">
<!-- Atmospheric Background Decoration -->
<div class="fixed inset-0 pointer-events-none -z-10 overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] rounded-full bg-secondary-container/10 blur-[100px]"></div>
</div>
<!-- Main Content Container -->
<main class="w-full max-w-[440px] flex flex-col items-center space-y-base animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Header / Logo Area -->
<header class="w-full text-center space-y-4 mb-8">
<div class="inline-flex items-center justify-center p-4 rounded-[24px] bg-primary-container/20 text-primary mb-2">
<span class="material-symbols-outlined text-[40px]" style="font-variation-settings: 'wght' 600;">eco</span>
</div>
<h1 class="font-headline-xl-mobile text-headline-xl-mobile md:font-headline-xl md:text-headline-xl text-primary tracking-tight">
                HabitFlow
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[280px] mx-auto">
                Your journey to organic growth and personal vitality starts here.
            </p>
</header>
<!-- Login Form Card -->
<section class="w-full glass-card border border-outline-variant/30 rounded-[32px] p-card-padding md:p-8 shadow-sm">
<form class="space-y-6" onsubmit="event.preventDefault()">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full h-[56px] pl-12 pr-4 bg-surface-container-low border border-outline-variant rounded-[16px] font-body-lg text-body-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none placeholder:text-outline-variant" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex items-center justify-between ml-1">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full h-[56px] pl-12 pr-12 bg-surface-container-low border border-outline-variant rounded-[16px] font-body-lg text-body-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none placeholder:text-outline-variant" id="password" placeholder="Enter password" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Primary Login Button -->
<button class="w-full h-[56px] bg-primary text-on-primary font-headline-sm text-headline-sm rounded-full shadow-lg shadow-primary/20 hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                    Login
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<!-- Divider -->
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink mx-4 font-label-sm text-label-sm text-outline uppercase tracking-widest">or</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Social Login -->
<button class="w-full h-[56px] bg-surface border border-outline-variant/50 text-on-surface font-body-lg text-body-lg rounded-full hover:bg-surface-container-low active:scale-[0.98] transition-all flex items-center justify-center gap-3" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
                    Continue with Google
                </button>
</form>
</section>
<!-- Footer Navigation -->
<footer class="pt-4 text-center">
<p class="font-body-lg text-body-lg text-on-surface-variant">
                Don't have an account? 
                <a class="font-body-numbers text-body-numbers text-primary font-semibold hover:underline transition-all" href="#">Register</a>
</p>
</footer>
</main>
<!-- Bottom Decorative Organic Shapes (Responsive) -->
<div class="fixed bottom-0 left-0 w-full h-[132px] pointer-events-none opacity-40 select-none hidden md:block">
<div class="w-full h-full bg-contain bg-bottom bg-no-repeat" data-alt="Soft watercolor organic shapes in emerald green and mint tones flowing across the bottom edge of a minimalist clean white app background. The style is professional, premium, and airy with plenty of white space. High-end lifestyle wellness aesthetic." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuC8nveA6wBwdXDAaRgCXX07aFGz6JKic9qrx-GZcO0UJAaA7xMyuh1WCRAZ4KRQLLeDw5-SpS2PWWCeR_n3yYw3P4rXwkZGyDx5ooKKuyqh_d59nnXgIr2_7GVlLuF73NF-ZhLD9cLgaIDgHOFLUvA9-hv9DE9LheG9TOMULGHQIqdigx1g_7ljoDh5PQDjLJ2YUYbkyZH6HjOw04mPdaVeb-J89JrvMEQxXSJiHRHeq7Di7itkrXm8')"></div>
</div>
<script>
        // Subtle micro-interaction for button press and hover states
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.classList.add('scale-95');
            });
            button.addEventListener('mouseup', () => {
                button.classList.remove('scale-95');
            });
            button.addEventListener('mouseleave', () => {
                button.classList.remove('scale-95');
            });
        });

        // Basic toggle for password visibility
        const visibilityBtn = document.querySelector('button[type="button"]');
        const passwordInput = document.getElementById('password');
        if(visibilityBtn && passwordInput) {
            visibilityBtn.addEventListener('click', () => {
                const isPassword = passwordInput.type === 'password';
                passwordInput.type = isPassword ? 'text' : 'password';
                visibilityBtn.querySelector('span').textContent = isPassword ? 'visibility_off' : 'visibility';
            });
        }
    </script>
</body></html>
