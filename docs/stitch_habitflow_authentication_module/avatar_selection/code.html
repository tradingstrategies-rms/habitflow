<script>
        function selectAvatar(element) {
            // Remove existing selected state
            document.querySelectorAll('.selected-avatar').forEach(el => {
                el.classList.remove('selected-avatar');
                el.classList.add('border-transparent');
                // Remove checkmark overlay if it exists
                const overlay = el.querySelector('.bg-primary\\/10');
                if (overlay) overlay.remove();
            });

            // Add selected state to clicked element
            element.classList.add('selected-avatar');
            element.classList.remove('border-transparent');

            // Add checkmark overlay
            const checkOverlay = document.createElement('div');
            checkOverlay.className = "absolute inset-0 bg-primary/10 flex items-center justify-center animate-in fade-in zoom-in duration-300";
            checkOverlay.innerHTML = `
                <div class="bg-primary text-on-primary rounded-full p-1 shadow-lg">
                    <span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">check</span>
                </div>
            `;
            element.appendChild(checkOverlay);
        }

        // Initialize category switching logic
        const tabs = document.querySelectorAll('.flex-shrink-0');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => {
                    t.classList.remove('bg-primary-container', 'text-on-primary-container');
                    t.classList.add('bg-surface-container-low', 'text-on-surface-variant');
                });
                tab.classList.add('bg-primary-container', 'text-on-primary-container');
                tab.classList.remove('bg-surface-container-low', 'text-on-surface-variant');
            });
        });
    </script>
